name: sneakcom_ecom
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter

    
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.0
  firebase_core: ^4.4.0
  go_router: ^17.1.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  shared_preferences: ^2.5.4
  carousel_slider: ^5.1.2
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:

  
  uses-material-design: true

  
  assets:
    
    - assets/images/
    - assets/logos/
    - assets/posters/
    - assets/product shoes/
    - assets/brand_icons/


  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          style: italic
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800


#splah.....

flutter_native_splash:
  color: "#1E1E2C"
  image: assets/logos/red part logo.png

  android: true
  ios: true

  android_12:
    color: "#1E1E2C"
    image: assets/logos/red part logo.png
    icon_background_color: "#1E1E2C"

  fullscreen: true